spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/library_manager?useTimezone=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_ROOT_USER:root}
    password: ${DB_ROOT_PASSWORD:root}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  logging:
    level:
      io.github.alineaos: debug
  server:
    error:
      include-stacktrace: always
      include-binding-errors: always
      include-message: always