spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:3306/library_manager?useTimezone=true&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  logging:
    level:
      io.github.alineaos: info
  server:
    error:
      include-stacktrace: never
      include-binding-errors: always
      include-message: always